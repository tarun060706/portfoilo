<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<link rel="stylesheet" href="dev.css">

<style>
body {
  background: #f5f2ef;
}

/* CONTAINER */
.contact-wrap {
  width: min(1100px, calc(100% - 2rem));
  margin: 0 auto;
  padding: 50px 0 72px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(300px, 1fr);
  gap: clamp(28px, 5vw, 60px);
  align-items: start;
}

/* LEFT SIDE */
.left h2 {
  font-size: clamp(28px, 4vw, 32px);
  margin-bottom: 10px;
}

.left p {
  color: #666;
  margin-bottom: 40px;
  line-height: 1.6;
  max-width: 56ch;
}

/* INFO ITEMS */
.info {
  display: flex;
  align-items: flex-start;
  margin-bottom: 30px;
}

.icon {
  width: 50px;
  height: 50px;
  background: #fde6de;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #e76f51;
  font-size: 20px;
  margin-right: 15px;
}

.info h4 {
  margin: 0;
  font-size: 16px;
}

.info p {
  margin: 5px 0 0;
  color: #555;
}

/* RIGHT FORM */
.form-box {
  background: #fff;
  padding: clamp(22px, 4vw, 40px);
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.form-box h3 {
  margin-bottom: 20px;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
  outline: none;
}

textarea {
  height: 120px;
  resize: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  color: white;
  cursor: pointer;
  background: linear-gradient(to right, #e76f51, #f4a261);
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* RESPONSIVE */
@media(max-width: 900px){
  .contact-wrap {
    grid-template-columns: 1fr;
  }

  .left p {
    margin-bottom: 28px;
  }
}

@media(max-width: 600px){
  .contact-wrap {
    width: min(1100px, calc(100% - 1.25rem));
    padding: 30px 0 48px;
  }

  .info {
    margin-bottom: 22px;
  }

  .icon {
    width: 44px;
    height: 44px;
    font-size: 18px;
  }
}
</style>

</head>
<body>
     <!-- Navbar (same as homepage) -->
    <nav class="nav">
        <div class="container nav-inner">
            <h1>Dev</h1>
            <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false">
                <span class="menu-icon">
                    <span class="menu-line"></span>
                    <span class="menu-line"></span>
                    <span class="menu-line"></span>
                </span>
            </button>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="#">Our services</a>
                <a href="works.html">My Works</a>
                <!-- <a href="Case-studies.html">Case-studies</a> -->
                <a href="#">Contact</a>
                <a href="contact.html" class="menu-panel-cta">Contact Now</a>
            </div>
        </div>
    </nav>

<div class="contact-wrap">

  <!-- LEFT -->
  <div class="left">
    <h2>Contact Information</h2>
    <p>
      Reach out to us through any of these channels. We typically
      respond within 24 hours.
    </p>

    <div class="info">
      <div class="icon">📍</div>
      <div>
        <h4>Address</h4>
        <p>Birtamode-4, Jhapa, Nepal</p>
      </div>
    </div>

    <div class="info">
      <div class="icon">📞</div>
      <div>
        <h4>Phone</h4>
        <p>+977-9800000000</p>
      </div>
    </div>

    <div class="info">
      <div class="icon">✉️</div>
      <div>
        <h4>Email</h4>
        <p>info@merotrend.com</p>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="form-box">
    <h3>Send a Message</h3>

    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Your Message"></textarea>

    <button>✈ Send Message</button>
  </div>

</div>
<script src="menu.js"></script>
</body>
</html>
